name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (skip puppeteer download)
        run: npm install --ignore-scripts

      - name: Build HTML site
        run: |
          node build/build-glossary.js
          node build/build-site.js
          node build/build-site-illustrated.js
          if [ -f "Heart Talk - Kannada.md" ]; then
            node build/build-site-kannada.js
          fi

      - name: Assemble site for deployment
        run: |
          mkdir -p _site
          # Core pages
          cp index.html _site/
          cp glossary.html _site/
          [ -f index-kn.html ] && cp index-kn.html _site/ || true
          [ -f index-illustrated.html ] && cp index-illustrated.html _site/ || true
          [ -f glossary-kn.html ] && cp glossary-kn.html _site/ || true
          # Assets
          cp book.css search.js search-index.json _site/
          # Chapter pages
          cp -r chapters _site/
          [ -d chapters-kn ] && cp -r chapters-kn _site/ || true
          [ -d chapters-illustrated ] && cp -r chapters-illustrated _site/ || true
          # PDFs (already committed to repo)
          cp -r pdfs _site/
          # Images
          [ -d images ] && cp -r images _site/ || true

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
